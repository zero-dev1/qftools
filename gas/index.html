<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gas Station — QF Tools</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .gas-display {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin: 30px 0;
      flex-wrap: wrap;
    }
    .gas-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 32px;
      text-align: center;
      min-width: 160px;
      flex: 1;
      max-width: 220px;
    }
    .gas-card.slow { border-top: 3px solid var(--green); }
    .gas-card.standard { border-top: 3px solid var(--accent); }
    .gas-card.fast { border-top: 3px solid var(--amber); }
    .gas-tier {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .gas-price {
      font-size: 2rem;
      font-weight: 700;
      margin: 8px 0 4px;
    }
    .gas-unit {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .gas-card.slow .gas-price { color: var(--green); }
    .gas-card.standard .gas-price { color: var(--accent); }
    .gas-card.fast .gas-price { color: var(--amber); }
    .history-section {
      margin-top: 30px;
    }
    .history-section h2 {
      font-size: 1.1rem;
      margin-bottom: 15px;
    }
    .chart-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .last-updated {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>Gas <span>Station</span></h1>
      <p class="subtitle">Real-time gas prices on QF Network</p>
    </div>

    <div class="gas-display">
      <div class="gas-card slow">
        <div class="gas-tier">Slow</div>
        <div class="gas-price" id="gas-slow">--</div>
        <div class="gas-unit">Gwei</div>
      </div>
      <div class="gas-card standard">
        <div class="gas-tier">Standard</div>
        <div class="gas-price" id="gas-standard">--</div>
        <div class="gas-unit">Gwei</div>
      </div>
      <div class="gas-card fast">
        <div class="gas-tier">Fast</div>
        <div class="gas-price" id="gas-fast">--</div>
        <div class="gas-unit">Gwei</div>
      </div>
    </div>

    <div class="last-updated">Last updated: <span id="gas-time">--</span></div>

    <div class="stats-bar" style="margin-top: 30px;">
      <div class="stat">
        <div class="stat-label">Base Fee</div>
        <div class="stat-value" id="base-fee">--</div>
      </div>
      <div class="stat">
        <div class="stat-label">Block Number</div>
        <div class="stat-value" id="block-num">--</div>
      </div>
      <div class="stat">
        <div class="stat-label">Block Time</div>
        <div class="stat-value">0.1s</div>
      </div>
    </div>

    <div class="history-section">
      <h2>Gas Price History</h2>
      <div class="chart-container" id="gas-chart">
        Chart will appear when enough data has been collected
      </div>
    </div>
  </div>

  <footer>
    <a href="/">QF Tools</a> &mdash; QF Network Chain ID 42
  </footer>

  <script src="../shared/nav.js"></script>
  <script>
    const API = "https://qf-explorer.mathswins.co.uk/api";

    async function loadGas() {
      try {
        const res = await fetch(`${API}/gas`);
        const data = await res.json();

        document.getElementById("gas-slow").textContent = data.slow || "0";
        document.getElementById("gas-standard").textContent = data.standard || "0";
        document.getElementById("gas-fast").textContent = data.fast || "0";
        document.getElementById("base-fee").textContent = (data.baseFee || "0") + " Gwei";
        document.getElementById("block-num").textContent = Number(data.blockNumber || 0).toLocaleString();
        document.getElementById("gas-time").textContent = new Date().toLocaleTimeString();
      } catch (e) {
        document.getElementById("gas-slow").textContent = "?";
        document.getElementById("gas-standard").textContent = "?";
        document.getElementById("gas-fast").textContent = "?";
      }
    }

    loadGas();
    setInterval(loadGas, 10000);
  </script>
</body>
</html>
