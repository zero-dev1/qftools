<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorer — QF Tools</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .tx-card { margin-bottom: 8px; }
    .tx-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tx-hash {
      font-family: monospace;
      font-size: 0.85rem;
      color: var(--accent);
      word-break: break-all;
    }
    .tx-value { font-weight: 600; font-size: 1rem; }
    .tx-value.positive { color: var(--green); }
    .tx-value.negative { color: var(--red); }
    .tx-details {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--muted);
      flex-wrap: wrap;
      gap: 4px;
    }
    .tx-addr { font-family: monospace; font-size: 0.8rem; }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .results-header h2 { font-size: 1.1rem; }
    .results-count { color: var(--muted); font-size: 0.85rem; }
    @media (max-width: 600px) {
      .tx-row { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1><span>QF</span> Explorer</h1>
      <p class="subtitle">Look up transactions for any wallet on QF Network</p>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-label">Indexed Block</div>
        <div class="stat-value" id="last-block">--</div>
      </div>
      <div class="stat">
        <div class="stat-label">Total Transactions</div>
        <div class="stat-value" id="total-txs">--</div>
      </div>
      <div class="stat">
        <div class="stat-label">Status</div>
        <div class="stat-value" id="status">--</div>
      </div>
    </div>

    <div class="search-box">
      <input type="text" class="input" id="address-input" placeholder="Enter wallet address (0x...)" spellcheck="false" autocomplete="off">
      <button class="btn" onclick="searchAddress()">Search</button>
      <button class="btn btn-outline" onclick="connectWallet()">Connect Wallet</button>
    </div>

    <div id="results"></div>
  </div>

  <footer>
    <a href="/">QF Tools</a> &mdash; QF Network Chain ID 42
  </footer>

  <script src="../shared/nav.js"></script>
  <script>
    const API = "https://qf-explorer.mathswins.co.uk/api";
    const input = document.getElementById("address-input");
    const resultsDiv = document.getElementById("results");

    async function loadStats() {
      try {
        const res = await fetch(`${API}/stats`);
        const data = await res.json();
        document.getElementById("last-block").textContent = Number(data.lastIndexedBlock).toLocaleString();
        document.getElementById("total-txs").textContent = Number(data.totalTransactions).toLocaleString();
        document.getElementById("status").textContent = "Synced";
        document.getElementById("status").style.color = "var(--green)";
      } catch (e) {
        document.getElementById("status").textContent = "Offline";
        document.getElementById("status").style.color = "var(--red)";
      }
    }

    async function searchAddress() {
      const address = input.value.trim();
      if (!/^0x[0-9a-fA-F]{40}$/.test(address)) {
        resultsDiv.innerHTML = '<div class="error">Please enter a valid Ethereum address (0x...)</div>';
        return;
      }

      resultsDiv.innerHTML = '<div class="loading">Searching</div>';

      try {
        const res = await fetch(`${API}/txs/${address}?limit=50`);
        const data = await res.json();

        if (data.transactions.length === 0) {
          resultsDiv.innerHTML = `
            <div class="empty-state">
              <h3>No transactions found</h3>
              <p style="margin-top: 8px;">This address has no indexed transactions yet.</p>
              <p style="margin-top: 6px; font-size: 0.85rem;">The chain is new — transactions will appear here as they happen.</p>
            </div>`;
          return;
        }

        const addrLower = address.toLowerCase();
        let html = `
          <div class="results-header">
            <h2>Transactions</h2>
            <span class="results-count">${data.count} result${data.count !== 1 ? 's' : ''}</span>
          </div>`;

        for (const tx of data.transactions) {
          const isOut = tx.from === addrLower;
          const isIn = tx.to === addrLower;
          const isSelf = isOut && isIn;
          const direction = isSelf ? "self" : isOut ? "out" : "in";
          const dirLabel = isSelf ? "Self" : isOut ? "Out" : "In";
          const badgeClass = isSelf ? "badge-accent" : isOut ? "badge-red" : "badge-green";
          const valueClass = isSelf ? "" : isOut ? "negative" : "positive";
          const sign = isOut && !isSelf ? "-" : "+";
          const time = new Date(tx.timestamp * 1000).toLocaleString();

          html += `
            <div class="card tx-card">
              <div class="tx-row">
                <span class="tx-hash">${tx.hash.slice(0, 18)}...${tx.hash.slice(-8)}</span>
                <span>
                  <span class="badge ${badgeClass}">${dirLabel}</span>
                  <span class="tx-value ${valueClass}">${sign}${parseFloat(tx.valueQF).toFixed(4)} QF</span>
                </span>
              </div>
              <div class="tx-details">
                <span>Block ${tx.blockNumber.toLocaleString()} &middot; ${time}</span>
                <span class="tx-addr">${isOut ? "To: " + (tx.to || "Contract Creation") : "From: " + tx.from}</span>
              </div>
            </div>`;
        }

        resultsDiv.innerHTML = html;
      } catch (e) {
        resultsDiv.innerHTML = `<div class="error">Failed to fetch transactions: ${e.message}</div>`;
      }
    }

    async function connectWallet() {
      if (!window.ethereum) {
        resultsDiv.innerHTML = '<div class="error">No wallet detected. Please install MetaMask or another Web3 wallet.</div>';
        return;
      }
      try {
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        if (accounts.length > 0) {
          input.value = accounts[0];
          searchAddress();
        }
      } catch (e) {
        resultsDiv.innerHTML = `<div class="error">Wallet connection failed: ${e.message}</div>`;
      }
    }

    input.addEventListener("keydown", (e) => { if (e.key === "Enter") searchAddress(); });
    loadStats();
    setInterval(loadStats, 30000);
  </script>
</body>
</html>
